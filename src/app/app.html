<mat-toolbar class="app-toolbar">

  <div class="brand-section">

    <span class="brand-logo">📦</span>

    <div>
      <div class="app-title">
        Sales Order PWA
      </div>

      <div class="app-subtitle">
        Offline First Order Management
      </div>
    </div>

  </div>

  <span class="spacer"></span>

  <div
    class="network-status"
    [class.online]="network.isOnline()"
    [class.offline]="!network.isOnline()">

    @if(network.isOnline()){

      <span>🟢 Online</span>

    } @else {

      <span>🔴 Offline</span>

    }

  </div>

  <div class="nav-links">

    <a mat-button routerLink="/" routerLinkActive="active-link" [routerLinkActiveOptions]="{exact:true}">
      Home
    </a>

    <a mat-button routerLink="/products" routerLinkActive="active-link">
      Products
    </a>

    <a mat-button routerLink="/customers" routerLinkActive="active-link">
      Customers
    </a>

    <a mat-button routerLink="/cart" routerLinkActive="active-link">
      Cart
      <span class="cart-badge">
        {{ cartStore.totalItems() }}
      </span>
    </a>

    <a mat-button routerLink="/orders" routerLinkActive="active-link">
      Orders
    </a>

    <a mat-button routerLink="/reports" routerLinkActive="active-link">
      Reports
    </a>

  </div>

</mat-toolbar>

<mat-divider></mat-divider>

<div class="page-container">
  <router-outlet></router-outlet>
</div>
