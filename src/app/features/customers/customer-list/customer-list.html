<h1>
  Customers
  <span class="count">
    ({{ customers.length }})
  </span>
</h1>

<div class="customers-container">

  @for(customer of customers; track customer.id){

    <mat-card class="customer-card">

      <div class="customer-header">

        <div class="avatar">
          {{ customer.name.charAt(0) }}
        </div>

        <div class="customer-details">
          <h3>{{ customer.name }}</h3>
          <p>{{ customer.phone }}</p>
        </div>

      </div>

    </mat-card>

  }

</div>
