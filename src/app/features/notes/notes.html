<h1>Notes PWA</h1>

<mat-form-field appearance="fill">
  <mat-label>New Note</mat-label>
  <input matInput [(ngModel)]="note" placeholder="Enter note">
</mat-form-field>

<button mat-raised-button color="primary" (click)="addNote()">Add</button>

<mat-divider></mat-divider>

<mat-list>
  @for(item of notes; track item){
    <mat-list-item>{{item}}</mat-list-item>
  }
</mat-list>
