<h1>Products</h1>

<div class="products-container">

  @for(product of products; track product.id){

    <mat-card class="product-card">

      <mat-card-title>
        {{product.name}}
      </mat-card-title>

      <mat-card-content>
        <p>₹{{product.price}}</p>
      </mat-card-content>

      <mat-card-actions>
        <button
          mat-raised-button
          color="primary"
          (click)="addToCart(product)">

          Add To Cart

        </button>
      </mat-card-actions>

    </mat-card>

  }

</div>
