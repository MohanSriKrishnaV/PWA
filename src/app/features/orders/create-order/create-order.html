<h1>Create Order</h1>

<mat-form-field appearance="fill">
  <mat-label>Customer</mat-label>
  <mat-select [(ngModel)]="customerId">
    <mat-option [value]="0">Select Customer</mat-option>
    @for(customer of customers; track customer.id){
      <mat-option [value]="customer.id">{{customer.name}}</mat-option>
    }
  </mat-select>
</mat-form-field>

<mat-form-field appearance="fill">
  <mat-label>Product</mat-label>
  <mat-select [(ngModel)]="productId">
    <mat-option [value]="0">Select Product</mat-option>
    @for(product of products; track product.id){
      <mat-option [value]="product.id">{{product.name}}</mat-option>
    }
  </mat-select>
</mat-form-field>

<mat-form-field appearance="fill">
  <mat-label>Quantity</mat-label>
  <input matInput type="number" [(ngModel)]="quantity">
</mat-form-field>

<button mat-raised-button color="primary" (click)="placeOrder()">Place Order</button>
